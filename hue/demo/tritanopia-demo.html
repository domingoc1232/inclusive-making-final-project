<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tritanopia Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 40px 20px;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #999;
    }

    .notice-bar {
      background: #FFFF00;
      padding: 20px 40px;
      border-radius: 14px;
    }

    .notice-bar a {
      color: #0000EE;
      font-size: 1.1rem;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .hint {
      font-size: 13px;
      color: #777;
      max-width: 340px;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <p class="eyebrow">Tritanopia Demo &mdash; Reduced Blue Sensitivity</p>

  <div class="notice-bar">
    <a href="#">&#x2192; Click here to continue</a>
  </div>

  <p class="hint">
    This blue link on yellow has low contrast under tritanopia simulation.<br>
    Enable <strong>Hue &rarr; Tritanopia</strong> to correct it.
  </p>
</body>
</html>
