<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protanopia Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 40px 20px;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #999;
    }

    .alert-card {
      background: #CC0000;
      color: #ffffff;
      padding: 24px 40px;
      border-radius: 14px;
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .hint {
      font-size: 13px;
      color: #777;
      max-width: 340px;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <p class="eyebrow">Protanopia Demo &mdash; Reduced Red Sensitivity</p>

  <div class="alert-card">&#x26A0; Service Unavailable</div>

  <p class="hint">
    This red alert has low contrast under protanopia simulation.<br>
    Enable <strong>Hue &rarr; Protanopia</strong> to correct it.
  </p>
</body>
</html>
